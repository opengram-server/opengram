version: '3.9'

services:
  stargift-admin-backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/tg
      - DB_NAME=tg
      - PORT=3001
      - CORS_ORIGIN=http://CHANGE_ME:5173
      - ADMIN_API_URL=http://admin-api:5000
      - ADMIN_API_KEY=
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=CHANGE_ME
      - RABBITMQ_URL=amqp://user:CHANGE_ME@rabbitmq:5672
    networks:
      - default
      - compose_tg-net

  stargift-admin-frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=
    ports:
      - "5173:5173"
    depends_on:
      - stargift-admin-backend
    networks:
      - default

networks:
  compose_tg-net:
    external: true
